version: "3.9"

services:
  mysql-primary:
    image: mysql:8.0
    container_name: lms-mysql-primary
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: lms
    ports:
      - "3307:3306"
    volumes:
      - primary-data:/var/lib/mysql
      - ./primary/conf.d:/etc/mysql/conf.d
      - ./primary/init:/docker-entrypoint-initdb.d

  mysql-replica:
    image: mysql:8.0
    container_name: lms-mysql-replica
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: lms
    ports:
      - "3308:3306"
    depends_on:
      - mysql-primary
    volumes:
      - replica-data:/var/lib/mysql
      - ./replica/conf.d:/etc/mysql/conf.d

volumes:
  primary-data:
  replica-data:
